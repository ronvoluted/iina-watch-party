<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Watch Party</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 12px;
    font-size: 13px;
    color: #333;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ── Shared ─────────────────────────────────────── */
  .hidden { display: none !important; }
  .view { display: flex; flex-direction: column; gap: 8px; }

  h2 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }

  button {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  button:active { background: #e8e8e8; }
  button.primary {
    background: #007aff;
    color: #fff;
    border-color: #007aff;
  }
  button.primary:active { background: #005ecb; }
  button.danger {
    color: #ff3b30;
    border-color: #ff3b30;
  }

  input[type="text"] {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
  }

  .status-line {
    font-size: 12px;
    color: #888;
  }

  .invite-box {
    padding: 8px;
    background: #f5f5f5;
    border-radius: 4px;
    font-family: SF Mono, Menlo, monospace;
    font-size: 12px;
    word-break: break-all;
    -webkit-user-select: text;
    user-select: text;
  }

  .peer-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .peer-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #34c759;
    flex-shrink: 0;
  }
  .peer-dot.offline { background: #8e8e93; }

  .warning-box {
    padding: 8px;
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 4px;
    font-size: 12px;
    color: #856404;
  }

  .error-box {
    padding: 8px;
    background: #fee;
    border: 1px solid #ff3b30;
    border-radius: 4px;
    font-size: 12px;
    color: #c00;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #ccc;
    border-top-color: #007aff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Idle view ──────────────────────────────────── -->
<div id="view-idle" class="view">
  <h2>Watch Party</h2>
  <p class="status-line" id="idle-status">Not connected</p>
  <button id="btn-create" class="primary">Create Room</button>
  <div style="display:flex; align-items:center; gap:8px;">
    <input id="invite-input" type="text" placeholder="Paste invite code…" />
  </div>
  <button id="btn-join">Join Room</button>
</div>

<!-- ── Connecting view ───────────────────────────── -->
<div id="view-connecting" class="view hidden">
  <h2>Watch Party</h2>
  <p class="status-line"><span class="spinner"></span><span id="connecting-text">Connecting…</span></p>
</div>

<!-- ── Connected view ────────────────────────────── -->
<div id="view-connected" class="view hidden">
  <h2>Watch Party</h2>
  <p class="status-line" id="connected-status">Connected</p>

  <div id="room-info">
    <p class="status-line">Room: <strong id="room-code"></strong></p>
  </div>

  <div id="invite-section">
    <p class="status-line">Invite:</p>
    <div class="invite-box" id="invite-display"></div>
    <button id="btn-copy-invite" style="margin-top:4px;">Copy Invite</button>
  </div>

  <div id="peer-section">
    <div class="peer-info">
      <span class="peer-dot" id="peer-dot"></span>
      <span id="peer-name">Waiting for peer…</span>
    </div>
  </div>

  <div id="warning-section" class="hidden">
    <div class="warning-box" id="warning-text"></div>
  </div>

  <button id="btn-leave" class="danger">Leave Room</button>
</div>

<!-- ── Error view ────────────────────────────────── -->
<div id="view-error" class="view hidden">
  <h2>Watch Party</h2>
  <div class="error-box" id="error-text"></div>
  <button id="btn-back">Back</button>
</div>

<script src="index.js"></script>
</body>
</html>
