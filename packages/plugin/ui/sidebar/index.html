<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Watch Party</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 12px;
    font-size: 13px;
    color: #333;
    -webkit-user-select: none;
    user-select: none;
    height: 100vh;
  }

  /* ── Shared ─────────────────────────────────────── */
  .hidden { display: none !important; }
  .view { display: flex; flex-direction: column; gap: 8px; }

  h2 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }

  button {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  button:active { background: #e8e8e8; }
  button.primary {
    background: #007aff;
    color: #fff;
    border-color: #007aff;
  }
  button.primary:active { background: #005ecb; }

  input[type="text"] {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  #invite-input {
    text-transform: uppercase;
  }
  #invite-input::placeholder {
    text-transform: none;
  }

  .status-line {
    font-size: 12px;
    color: #888;
  }

  .status-with-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #888;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #8e8e93;
    flex-shrink: 0;
  }
  .status-dot.connected { background: #34c759; }

  .peer-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #888;
  }
  .peer-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #007aff;
    flex-shrink: 0;
  }
  .peer-dot.offline { background: #8e8e93; }

  .status-row {
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    margin-bottom: 4px;
  }

  .warning-box {
    padding: 8px 12px;
    background: gold;
    border: 1px solid gold;
    border-radius: 6px;
    font-size: 13px;
    color: #333;
    text-align: center;
  }

  .error-box {
    padding: 8px;
    background: #fee;
    border: 1px solid #ff3b30;
    border-radius: 4px;
    font-size: 12px;
    color: #c00;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #ccc;
    border-top-color: #007aff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Connecting (centered spinner, cancel at bottom) */
  #view-connecting {
    align-items: center;
    min-height: calc(100vh - 24px);
  }
  #connecting-top-spacer { flex: 1; }
  #connecting-bottom-spacer { flex: 1; }
  #btn-cancel {
    background: crimson;
    color: #fff;
    border-color: crimson;
    font-weight: bold;
    align-self: stretch;
  }
  #btn-cancel:active { background: #a0001c; }

  /* ── Connected layout (leave button at bottom) ──── */
  #view-connected {
    min-height: calc(100vh - 24px);
  }
  #connected-spacer { flex: 1; }
  #btn-leave {
    background: crimson;
    color: #fff;
    border-color: crimson;
    font-weight: bold;
  }
  #btn-leave:active { background: #a0001c; }

</style>
</head>
<body>

<!-- ── Idle view ──────────────────────────────────── -->
<div id="view-idle" class="view">
  <div class="status-with-dot">
    <span class="status-dot" id="idle-dot"></span>
    <span id="idle-status">Not connected</span>
  </div>
  <button id="btn-create" class="primary">Create Room</button>
  <div style="display:flex; align-items:center; gap:8px;">
    <input id="invite-input" type="text" placeholder="Enter room code…" />
  </div>
  <button id="btn-join">Join Room</button>
</div>

<!-- ── Connecting view ───────────────────────────── -->
<div id="view-connecting" class="view hidden">
  <div id="connecting-top-spacer"></div>
  <p class="status-line"><span class="spinner"></span><span id="connecting-text">Connecting…</span></p>
  <div id="connecting-bottom-spacer"></div>
  <button id="btn-cancel">Cancel</button>
</div>

<!-- ── Connected view ────────────────────────────── -->
<div id="view-connected" class="view hidden">
  <div class="status-row">
    <div class="status-with-dot">
      <span class="status-dot connected" id="connected-dot"></span>
      <span id="connected-status">Connected</span>
    </div>
    <div class="peer-info">
      <span class="peer-dot" id="peer-dot"></span>
      <span id="peer-name">Waiting for peer…</span>
    </div>
  </div>

  <div id="invite-section">
    <button id="btn-copy-invite">Copy Room Code: <strong id="room-code"></strong></button>
  </div>

  <div id="warning-section" class="hidden">
    <div class="warning-box" id="warning-text"></div>
  </div>

  <div id="connected-spacer"></div>

  <button id="btn-leave">Leave Room</button>
</div>

<!-- ── Error view ────────────────────────────────── -->
<div id="view-error" class="view hidden">
  <div class="error-box" id="error-text"></div>
  <button id="btn-back">Back</button>
</div>

<script src="index.js"></script>
</body>
</html>
